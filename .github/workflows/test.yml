name: Test

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongodb/mongodb-community-server:7.0-ubi8
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: admin_password

    container:
      image: dlp3d/orchestrator:latest
      options: --entrypoint ""

    env:
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_MEMORY_DB: memory_test
      MONGODB_MEMORY_PASSWORD: orchestrator_password
      MONGODB_MEMORY_USER: orchestrator
      MONGODB_WEB_DB: web_test
      MONGODB_WEB_PASSWORD: orchestrator_password
      MONGODB_WEB_USER: orchestrator

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Download test input
      run: |
        mkdir -p input
        cd input
        curl -LjO https://github.com/LazyBusyYang/CatStream/releases/download/orchestrator_cicd_files/test_audio_16kHz.wav
        curl -LjO https://github.com/LazyBusyYang/CatStream/releases/download/orchestrator_cicd_files/test_audio_24kHz.wav
        cp test_audio_16kHz.wav test_audio.wav
        cd ..
        ls input -la
    - name: Install project
      run: |
        /opt/venv/bin/pip install .
    - name: Init mongodb
      run: |
        /opt/venv/bin/python tools/setup_mongodb_for_test.py --host $MONGODB_HOST --port $MONGODB_PORT --admin_username admin --admin_password admin_password --web_database $MONGODB_WEB_DB --memory_database $MONGODB_MEMORY_DB --orchestrator_username $MONGODB_MEMORY_USER --orchestrator_password $MONGODB_MEMORY_PASSWORD
    - name: Run tests
      run: |
        mkdir -p logs
        PYTHONPATH=/__w/audio2face/audio2face /opt/venv/bin/python -m pytest tests --log-cli-level=ERROR
    - name: Cat pytest log
      run: |
        cat logs/pytest.log