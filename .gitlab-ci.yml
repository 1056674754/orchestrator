image: registry.sensetime.com/zoetrope/library/docker:19.03.15_aws

variables:
  GIT_SUBMODULE_STRATEGY: recursive

stages:
  - lint_python
  - build
  - test

lint_python:
  image: registry.sensetime.com/zoetrope/lint:ubuntu1804_x64_py38
  before_script:
    - export http_proxy=$PROXY_URL
    - export https_proxy=$PROXY_URL
    - export HTTP_PROXY=$PROXY_URL
    - export HTTPS_PROXY=$PROXY_URL
  stage: lint_python
  script:
    - source /root/miniconda3/etc/profile.d/conda.sh
    - conda activate lint
    - pre-commit install
    - pre-commit run --all-files
    - interrogate -vinmMI --ignore-init-method --ignore-module --ignore-nested-functions --ignore-regex "__repr__" -f 60 orchestrator/

test:
  stage: test
  image:
    name: registry.sensetime.com/zoetrope/her:orchestrator-dev
    entrypoint: [""]
  services:
    - name: redis:7-alpine
      alias: redis
      command: ["redis-server", "--requirepass", "CICDredisPWD"]
    - name: registry.sensetime.com/library/mongo:4.2.8
      alias: mongodb
      command: ["mongod", "--bind_ip_all", "--port", "27017"]
  variables:
    MONGODB_HOST: mongodb
    MONGODB_PORT: 27017
    MONGO_INITDB_ROOT_USERNAME: admin
    MONGO_INITDB_ROOT_PASSWORD: admin_password
  script:
    - mkdir -p scripts
    - mkdir -p input
    - wget http://file.bj.zoe.sensetime.com/resources/gaoyang3/3DAC/orchestrator/test_audio_16kHz.wav -O input/test_audio.wav
    - wget http://file.bj.zoe.sensetime.com/resources/gaoyang3/3DAC/orchestrator/test_audio_16kHz.wav -O input/test_audio_16kHz.wav
    - wget http://file.bj.zoe.sensetime.com/resources/gaoyang3/3DAC/orchestrator/test_audio_24kHz.wav -O input/test_audio_24kHz.wav
    - mkdir -p output
    - /opt/venv/bin/python -m pip install .
    - /opt/venv/bin/python tools/ensure_memory_mongodb.py --host mongodb --port 27017 --admin_username admin --admin_password admin_password --web_database web_test --memory_database memory_test --orchestrator_username orchestrator --orchestrator_password orchestrator_password
    - /opt/venv/bin/python -m pytest tests

build:docker_image:
  stage: build
  script:
    - docker login registry.sensetime.com --username ${DOCKER_USER} --password ${DOCKER_PASS}
    - DOCKER_BUILDKIT=1 docker build --no-cache -t local:temp -f ./Dockerfile .
    - docker tag local:temp registry.sensetime.com/zoetrope/her:orchestrator-${CI_COMMIT_TAG}
    - echo "Pushing image to registry.sensetime.com/zoetrope/her:orchestrator-${CI_COMMIT_TAG}"
    - docker push registry.sensetime.com/zoetrope/her:orchestrator-${CI_COMMIT_TAG}
  only:
    - tags
